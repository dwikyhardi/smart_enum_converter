name: smart_enum_converter
description: A Dart package to generate custom enum converters for robust JSON serialization, handling unknown values gracefully.
version: 0.0.1
publish_to: 'none' #  Remove this line if/when you want to publish to pub.dev

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  analyzer: ^7.4.5
  build: ^2.4.2
  code_builder: ^4.10.1
  dart_style: ^3.1.0
  json_annotation: ^4.9.0
  path: ^1.9.1
  pub_semver: ^2.2.0
  recase: ^4.1.0
  source_gen: ^2.0.0

dev_dependencies:
  build_runner: ^2.4.15
  build_test: ^2.2.3
  json_serializable: ^6.9.5
  lints: ^6.0.0
  test: ^1.26.1
